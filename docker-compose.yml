services:
  ai-service:
    container_name: easybake-ai-service
    build:
      context: ./services/ai-service
    env_file:
      - ./services/ai-service/.env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      UVICORN_RELOAD: "false"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  recipe-service:
    container_name: easybake-recipe-service
    build:
      context: ./services/recipe-service
    env_file:
      - ./services/recipe-service/.env
    environment:
      PORT: 4000
      AI_SERVICE_URL: http://ai-service:8000/api
    depends_on:
      ai-service:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
