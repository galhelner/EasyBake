name: Build iOS IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/easy_bake_mobile

    steps:
      - uses: actions/checkout@v4
      
      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Force Patch device_info_plus
        run: |
          echo "Searching for FPPDeviceInfoPlusPlugin.m..."
          # Find the file anywhere in the pub cache and replace the problematic selector
          # We use a broader regex to ensure it catches the line regardless of spacing
          find /Users/runner/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" -exec sed -i '' 's/isiOSAppOnVision/processInfo.isiOSAppOnVision/g' {} +
          find /Users/runner/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" -exec sed -i '' 's/\[\[NSProcessInfo processInfo\] isiOSAppOnVision\]/NO/g' {} +
          
          echo "Patching complete. Verifying file content (first 40 lines):"
          find /Users/runner/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" -exec head -n 40 {} +

      - name: Build Frameworks
        run: flutter build ios --release --no-codesign
        
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ../../../EasyBake.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: EasyBake.ipa