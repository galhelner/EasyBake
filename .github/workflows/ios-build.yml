name: Build iOS IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-15 # Updated from macos-latest
    defaults:
      run:
        working-directory: apps/easy_bake_mobile

    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      # Adding this helps resolve plugin version conflicts
      - name: Update CocoaPods
        run: |
          cd ios
          pod repo update
          pod install
        
      - name: Build Frameworks
        run: flutter build ios --release --no-codesign
        
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ../../../EasyBake.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: EasyBake.ipa