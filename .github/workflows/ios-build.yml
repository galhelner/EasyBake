name: Build iOS IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/easy_bake_mobile

    steps:
      - uses: actions/checkout@v4
      
      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Force Patch device_info_plus
        run: |
          TARGET_FILE=$(find /Users/runner/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" | head -n 1)
          echo "Patching file: $TARGET_FILE"
          
          # 1. Replace the actual problematic method call with a hardcoded NO
          sed -i '' 's/\[\[NSProcessInfo processInfo\] isiOSAppOnVision\]/NO/g' "$TARGET_FILE"
          
          # 2. Fix the line where the variable is assigned to the results dictionary
          # We search for the specific key assignment and ensure it uses a valid variable
          sed -i '' 's/.*isiOSAppOnVision\]\];/      @"isiOSAppOnVision": @NO\n    \};/g' "$TARGET_FILE"

          echo "Verification (Lines 60-80):"
          sed -n '60,80p' "$TARGET_FILE"

      - name: Build Frameworks
        run: flutter build ios --release --no-codesign
        
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ../../../EasyBake.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: EasyBake.ipa