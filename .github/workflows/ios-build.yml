name: Build iOS IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14 # Downgraded to a stable macOS environment
    defaults:
      run:
        working-directory: apps/easy_bake_mobile

    steps:
      - uses: actions/checkout@v4
      
      # Pin to the "Golden" Xcode version. 
      # New enough for VisionOS, old enough to avoid Xcode 16 bugs.
      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # Wipe the slate clean of our previous cache hacks
      - name: Clean Cache and Install Dependencies
        run: |
          flutter clean
          flutter pub get

      # Build exclusively for the physical iPhone architecture
      - name: Build Frameworks
        run: flutter build ios --release --no-codesign
        
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ../../../EasyBake.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: EasyBake.ipa