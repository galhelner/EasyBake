name: Build iOS IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/easy_bake_mobile

    steps:
      - uses: actions/checkout@v4
      
      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Fix device_info_plus (Header Patch)
        run: |
          TARGET_FILE=$(find /Users/runner/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" | head -n 1)
          echo "Patching file: $TARGET_FILE"
          
          # We add a macro at the top of the file. 
          # This tells the compiler: "If you see isiOSAppOnVision, just treat it as 0 (false)"
          # This is non-destructive and won't break your dictionaries.
          sed -i '' '1i\
          #define isiOSAppOnVision isiOSAppOnMac
          ' "$TARGET_FILE"
          
          echo "Verification (First 15 lines):"
          head -n 15 "$TARGET_FILE"

      - name: Build Frameworks
        run: flutter build ios --release --no-codesign
        
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ../../../EasyBake.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: EasyBake.ipa