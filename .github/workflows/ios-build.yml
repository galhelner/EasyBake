name: Build iOS IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/easy_bake_mobile

    steps:
      - uses: actions/checkout@v4
      
      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Fix device_info_plus (Direct Source Patch)
        run: |
          TARGET_FILE=$(find /Users/runner/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" | head -n 1)
          echo "Patching file: $TARGET_FILE"
          
          # This replaces the logic [[info isiOSAppOnVision]] (the source of the error) 
          # with @NO directly so the compiler never even sees the problematic word.
          sed -i '' 's/\[info isiOSAppOnVision\]/@NO/g' "$TARGET_FILE"
          sed -i '' 's/\[\[NSProcessInfo processInfo\] isiOSAppOnVision\]/@NO/g' "$TARGET_FILE"
          
          echo "Verification (Lines 30-55):"
          sed -n '30,55p' "$TARGET_FILE"

      - name: Build Frameworks
        run: flutter build ios --release --no-codesign
        
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ../../../EasyBake.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: EasyBake.ipa