name: Build iOS IPA
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/easy_bake_mobile

    steps:
      - uses: actions/checkout@v4
      
      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Force Patch device_info_plus
        run: |
          echo "Applying Clean Patch to FPPDeviceInfoPlusPlugin.m..."
          
          # Target file path
          TARGET_FILE=$(find /Users/runner/.pub-cache -name "FPPDeviceInfoPlusPlugin.m" | head -n 1)
          
          # We replace the problematic lines with simple, valid Objective-C logic
          # This replaces the declaration and the assignment to avoid the "selector" error
          sed -i '' 's/.*isiOSAppOnVision.*/    NSNumber *isiOSAppOnVision = [NSNumber numberWithBool:NO];/g' "$TARGET_FILE"
          
          echo "Patching complete. Verifying lines 30-40:"
          sed -n '30,40p' "$TARGET_FILE"

      - name: Build Frameworks
        run: flutter build ios --release --no-codesign
        
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ../../../EasyBake.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: EasyBake.ipa