# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - easybake-chat-service

on:
  push:
    branches:
      - main
    paths:
      - 'services/chat-service/**'
      - '.github/workflows/main_easybake-chat-service.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: services/chat-service/package-lock.json

      - name: 'npm install, build, and test'
        env:
          # Prisma requires a DATABASE_URL to generate the client types
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
        run: |
          cd services/chat-service
          npm install
          npx prisma generate
          npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: chat-app
          path: |
            services/chat-service/
            !services/chat-service/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write 
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: chat-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_262835F23AEF47028BF7CADD5DE38F10 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_02CFF7E96EB145748230969D215A2436 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_70436B6D2FDB473397AD5EB128C28948 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'easybake-chat-service'
          slot-name: 'Production'
          package: .
          cache: 'npm'
          cache-dependency-path: services/chat-service/package-lock.json

      - name: 'npm install, build, and test'
        run: |
          cd services/chat-service
          npm install
          # npx prisma generate # Uncomment this if your chat service also uses Prisma
          npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: chat-app # Changed name to avoid conflict with recipe-service artifacts
          path: |
            services/chat-service/
            !services/chat-service/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: chat-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_262835F23AEF47028BF7CADD5DE38F10 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_02CFF7E96EB145748230969D215A2436 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_70436B6D2FDB473397AD5EB128C28948 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'easybake-chat-service'
          slot-name: 'Production'
          package: .