# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - easybake-chat-service

on:
  push:
    branches:
      - main
    paths:
      - 'services/chat-service/**'
      - '.github/workflows/main_easybake-chat-service.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: services/chat-service/package-lock.json

      - name: 'npm install, build, and test'
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
        run: |
          cd services/chat-service
          npm install
          npx prisma generate
          npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: chat-app
          path: |
            services/chat-service/dist/
            services/chat-service/package.json
            services/chat-service/package-lock.json
            services/chat-service/node_modules/
            services/chat-service/prisma/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: chat-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          # Use the exact name of your Sweden-based Web App here
          app-name: 'easybake-chat-service' 
          slot-name: 'Production'
          package: .
          # Swap the secret name below to match what you create in GitHub
          publish-profile: ${{ secrets.AZURE_CHAT_SERVICE_SWEDEN_PUBLISH_PROFILE }}