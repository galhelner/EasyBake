name: CI/CD Pipeline Template

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
        description: 'Programming language (node or python)'
      service_name:
        required: true
        type: string
        description: 'Service name (recipe-service, chat-service, ai-service)'
      workdir:
        required: true
        type: string
        description: 'Working directory for the service'
      app_name:
        required: true
        type: string
        description: 'Azure App Service name'
      artifact_name:
        required: true
        type: string
        description: 'Name of the artifact to upload'
    secrets:
      PUBLISH_PROFILE:
        required: true
        description: 'Azure publish profile for deployment'

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - if: inputs.language == 'node'
        name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workdir }}/package-lock.json

      - if: inputs.language == 'node'
        name: 'npm install and generate Prisma client'
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
        run: |
          cd ${{ inputs.workdir }}
          npm install
          npx prisma generate

      - if: inputs.language == 'node'
        name: 'run unit tests'
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
        run: |
          cd ${{ inputs.workdir }}
          npm run test:unit

  build:
    runs-on: ubuntu-latest
    needs: run-unit-tests
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      # Python workflow
      - if: inputs.language == 'python'
        name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ${{ inputs.workdir }}/requirements.txt

      - if: inputs.language == 'python'
        name: Create and Start virtual environment and Install dependencies
        run: |
          cd ${{ inputs.workdir }}
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - if: inputs.language == 'python'
        name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            ${{ inputs.workdir }}/
            !${{ inputs.workdir }}/antenv/

      # Node.js workflow
      - if: inputs.language == 'node'
        name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.workdir }}/package-lock.json

      - if: inputs.language == 'node'
        name: 'npm install, build, and zip'
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
        run: |
          cd ${{ inputs.workdir }}
          npm install
          npx prisma generate
          npm run build --if-present
          chmod -R +x ./node_modules/.bin
          zip -r ../../release.zip .

      - if: inputs.language == 'node'
        name: Upload artifact for deployment job
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.artifact_name }}
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v5
        with:
          name: ${{ inputs.artifact_name }}
          path: .

      - if: inputs.language == 'python'
        name: 'Deploy Python app to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp-python
        with:
          app-name: ${{ inputs.app_name }}
          slot-name: 'Production'
          publish-profile: ${{ secrets.PUBLISH_PROFILE }}

      - if: inputs.language == 'node'
        name: 'Deploy Node.js app to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp-node
        with:
          app-name: ${{ inputs.app_name }}
          slot-name: 'Production'
          package: release.zip
          publish-profile: ${{ secrets.PUBLISH_PROFILE }}
